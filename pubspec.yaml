name: liora
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  bloc: ^9.2.1
  cached_network_image: ^3.4.1
  camera: ^0.12.0+1
  cloud_firestore: ^6.5.0
  # Pinned to 6.x: connectivity_plus 7.x uses NWPath.isUltraConstrained,
  # an SDK API not available in the current Xcode (16.4).
  connectivity_plus: ^6.1.0
  dartz: ^0.10.1
  dio: ^5.9.2
  equatable: ^2.0.8
  firebase_ai: ^3.12.2
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  firebase_storage: ^13.4.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_markdown: ^0.7.7+1
  flutter_tts: ^4.2.5
  get_it: ^9.2.1
  go_router: ^17.3.0
  google_sign_in: ^7.2.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  image_picker: ^1.2.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.5
  speech_to_text: ^7.4.0
  uuid: ^4.5.3

# Force any transitive 7.x reference down to a version that builds on Xcode 16.4.
dependency_overrides:
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  build_runner: ^2.15.0
  hive_ce_generator: ^1.11.1

flutter:
  uses-material-design: true
