<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbFluid" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="50%" stop-color="#FF5A5F"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <filter id="ambientBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="70" fill="url(#orbFluid)" opacity="0.35" filter="url(#ambientBlur)"/>
  <circle cx="100" cy="100" r="64" fill="#121417" stroke="url(#orbFluid)" stroke-width="3.5"/>
  <circle cx="100" cy="100" r="48" fill="url(#orbFluid)" opacity="0.85"/>
</svg>
